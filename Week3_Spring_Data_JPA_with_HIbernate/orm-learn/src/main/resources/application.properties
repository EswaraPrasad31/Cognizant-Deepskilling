# ===========================
# APPLICATION NAME
# ===========================
spring.application.name=orm-learn

# ===========================
# DATABASE CONFIGURATION
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / HIBERNATE
# ===========================
spring.jpa.hibernate.ddl-auto=validate

# DO NOT specify MySQL5Dialect
# Hibernate 6 automatically detects the correct dialect.

# ===========================
# SQL LOGGING
# ===========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===========================
# SPRING LOGGING
# ===========================
logging.level.org.springframework=INFO
logging.level.com.cognizant=DEBUG

# ===========================
# CONSOLE PATTERN
# ===========================
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-35.35logger{35} %25M %4L %m%n