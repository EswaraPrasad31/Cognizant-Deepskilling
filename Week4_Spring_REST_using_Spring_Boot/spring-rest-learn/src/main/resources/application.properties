# ===================================================================
# SPRING BOOT APPLICATION PROPERTIES
# ===================================================================

# Configure the port on which the web application server will run
server.port=8083

# Set the logging level for Spring Framework classes to INFO to avoid excessive console output
logging.level.org.springframework=info

# Set the logging level for our application classes to DEBUG so we can see internal flow and variable states
logging.level.com.cognizant.springlearn=debug

# Define a custom pattern for console logs
# Pattern structure:
# %d{yyMMdd}              - Date in YYMMDD format
# %d{HH:mm:ss.SSS}        - Time in 24-hour HH:mm:ss.SSS format
# %-20.20thread           - Thread name, left-aligned, exact 20 characters
# %5p                     - Logging level (e.g., INFO, DEBUG), 5 characters
# %-25.25logger{25}       - Logger class name, left-aligned, max 25 characters
# %25M                    - Method name, right-aligned, 25 characters
# %m%n                    - Actual log message followed by a newline
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n
