# ===================================================================
# SPRING BOOT APPLICATION PROPERTIES
# ===================================================================

# Server configuration
server.port=8080

# Hands-on 3 Logging Configuration
# Set logging level for Spring framework to INFO to reduce noise
logging.level.org.springframework=info

# Set logging level for our application package to DEBUG to see custom debug logs
logging.level.com.cognizant.springlearn=debug

# Custom console logging pattern
# Format: Date(YYMMDD)|Time(HH:mm:ss.SSS)|Thread|Log Level|Logger Name|Method Name|Message
logging.pattern.console=%d{yyMMdd}|%d{HH:mm:ss.SSS}|%-20.20thread|%5p|%-25.25logger{25}|%25M|%m%n
